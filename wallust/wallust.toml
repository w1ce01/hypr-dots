cat > wallust/wallust.toml << 'EOF'
# ─────────────────────────────────────────────────
# Wallust Configuration
# ─────────────────────────────────────────────────

# Palette generation
palette = "dark16"

# Color blending
blend = 0.65

# Templates to generate
[templates]
# Hyprland colors
hyprland = { template = "hyprland.conf", target = "~/.config/wallust/colors-hyprland.conf" }

# Waybar
waybar = { template = "waybar.css", target = "~/.config/wallust/waybar.css" }

# Terminals
alacritty = { template = "alacritty.toml", target = "~/.config/alacritty/alacritty.toml" }
foot = { template = "foot.ini", target = "~/.config/foot/foot.ini" }

# Launcher
fuzzel = { template = "fuzzel.ini", target = "~/.config/fuzzel/fuzzel.ini" }

# GTK (optional)
gtk = { template = "gtk.css", target = "~/.config/wallust/gtk.css" }

# Plain text exports
colors = { template = "colors", target = "~/.config/wallust/colors" }
EOF
