# ██║  ██║╚██╗ ██╔╝██╔══██╗██╔══██╗██║     ██╔══██╗████╗  ██║██╔══██╗
# ███████║ ╚████╔╝ ██████╔╝██████╔╝██║     ███████║██╔██╗ ██║██║  ██║
# ██╔══██║  ╚██╔╝  ██╔═══╝ ██╔══██╗██║     ██╔══██║██║╚██╗██║██║  ██║
# ██║  ██║   ██║   ██║     ██║  ██║███████╗██║  ██║██║ ╚████║██████╔╝
# ╚═╝  ╚═╝   ╚═╝   ╚═╝     ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝╚═╝  ╚═══╝╚═════╝
# Author: w1ce01 | Ultramarine Linux | RTX 4060

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  VARIABLES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

$mod   = SUPER
$left  = h
$down  = j
$up    = k
$right = l
$term  = alacritty
$menu  = fuzzel

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MONITORS
#  DP-2   → Main monitor (1920x1080 @165Hz)
#  HDMI-A-1 → Secondary monitor (1920x1080 @144Hz)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

monitor = DP-2,1920x1080@165, 0x0, 1
monitor = HDMI-A-1,1920x1080@144, 1920x0, 1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  WORKSPACES
#  1-7 → Main monitor (DP-2)
#  8-10 → Secondary monitor (HDMI-A-1)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  GENERAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    gaps_in  = 0
    gaps_out = 0
    border_size = 3

    # Colors are updated dynamically by wallust via wallpaper.sh
    col.active_border   = rgb(fe8019)
    col.inactive_border = rgba(00000000)

    layout        = scrolling
    allow_tearing = false
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  DECORATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

decoration {
    rounding = 0

    blur {
        enabled          = true
        size             = 2
        passes           = 2
        xray             = false
        new_optimizations = true
    }

    shadow {
        enabled = false
    }

    # Dim inactive windows slightly
    dim_inactive = true
    dim_strength = 0.1
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ANIMATIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

animations {
    enabled = true
    bezier  = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,    1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border,     1, 10, default
    animation = borderangle,1, 8,  default
    animation = fade,       1, 7,  default
    animation = workspaces, 1, 6,  default
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  LAYOUT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

dwindle {
    preserve_split = true
}

master {
    new_on_top = false
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  INPUT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

input {
    kb_layout  = us,ru
    kb_options = grp:alt_shift_toggle  # Alt+Shift to switch layout

    numlock_by_default = true
    follow_mouse       = 1
    sensitivity        = 0

    touchpad {
        natural_scroll = true
    }
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MISC
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

misc {
    force_default_wallpaper = -1
}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AUTOSTART
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

exec-once = waybar                # Status bar
exec-once = hypridle              # Idle management
exec-once = waypaper              # Wallpaper manager
exec-once = swaync                # Notification daemon
exec-once = deskflow --daemon     # Mouse/keyboard sharing
exec-once = wayvnc                # VNC server
exec-once = mkdir -p ~/Pictures   # Screenshots directory
exec-once = hyprpm reload -n      # Load plugins

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — BASIC
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, Return,       exec, $term           # Open terminal
bind = $mod, space,        exec, $menu           # Open launcher
bind = $mod, E,            exec, thunar          # Open file manager
bind = $mod SHIFT, Q,      killactive,           # Close window
bind = $mod SHIFT, Return, togglefloating,       # Toggle floating
bind = $mod, F,            fullscreen,           # Fullscreen
bind = $mod SHIFT, C,      exec, hyprctl reload  # Reload config
bind = $mod SHIFT, E,      exit,                 # Exit Hyprland

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — FOCUS (vim + arrows)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, $left,  movefocus, l
bind = $mod, $down,  movefocus, d
bind = $mod, $up,    movefocus, u
bind = $mod, $right, movefocus, r
bind = $mod, left,   movefocus, l
bind = $mod, down,   movefocus, d
bind = $mod, up,     movefocus, u
bind = $mod, right,  movefocus, r

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — MOVE WINDOWS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod SHIFT, $left,  movewindow, l
bind = $mod SHIFT, $down,  movewindow, d
bind = $mod SHIFT, $up,    movewindow, u
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, left,   movewindow, l
bind = $mod SHIFT, down,   movewindow, d
bind = $mod SHIFT, up,     movewindow, u
bind = $mod SHIFT, right,  movewindow, r

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — WORKSPACES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Switch workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Navigate workspaces
bind = $mod CTRL, left,  workspace, e-1
bind = $mod CTRL, right, workspace, e+1

# Scratchpad
bind = $mod SHIFT, minus, movetoworkspace, special:scratchpad
bind = $mod, minus,       togglespecialworkspace, scratchpad

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — LAYOUT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, V,        layoutmsg, togglesplit
bind = $mod, S,        changegroupactive,
bind = $mod SHIFT, S,  togglegroup,
bind = $mod CTRL, S,   moveoutofgroup,

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — MEDIA & BRIGHTNESS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bindl = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bindl = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bindl = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindl = , XF86MonBrightnessDown,exec, brightnessctl set 5%-
bindl = , XF86MonBrightnessUp,  exec, brightnessctl set 5%+
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPrev,        exec, playerctl previous

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — SCREENSHOTS
#  Print       → Full screenshot
#  Shift+Print → Area screenshot (saved)
#  Ctrl+Print  → Area screenshot (clipboard)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = , Print,       exec, grim ~/Pictures/screenshot-$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"
bind = SHIFT, Print,  exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d_%H%M%S).png && notify-send "Area screenshot saved"
bind = CTRL, Print,   exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copied to clipboard"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — NOTIFICATIONS (SwayNC)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, N,           exec, swaync-client -t -sw  # Toggle panel
bind = $mod SHIFT, N,     exec, swaync-client -C      # Clear all
bind = $mod CTRL, N,      exec, swaync-client -d      # Toggle DND
bind = $mod ALT, N,       exec, swaync-client -op     # Open latest

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MOUSE BINDINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bindm = $mod, mouse:272, movewindow    # Super+LMB → move window
bindm = $mod, mouse:273, resizewindow  # Super+RMB → resize window

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SUBMAP — WINDOW MODE (Super+W)
#  Vim-like window management
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, W, submap, window
submap = window

bind = , h,     movefocus, l
bind = , j,     movefocus, d
bind = , k,     movefocus, u
bind = , l,     movefocus, r
bind = , left,  movefocus, l
bind = , down,  movefocus, d
bind = , up,    movefocus, u
bind = , right, movefocus, r

bind = SHIFT, h, movewindow, l
bind = SHIFT, j, movewindow, d
bind = SHIFT, k, movewindow, u
bind = SHIFT, l, movewindow, r

bind = CTRL, h, workspace, e-1
bind = CTRL, l, workspace, e+1

bind = , 1, workspace, 1
bind = , 2, workspace, 2
bind = , 3, workspace, 3
bind = , 4, workspace, 4
bind = , 5, workspace, 5
bind = , 6, workspace, 6
bind = , 7, workspace, 7
bind = , 8, workspace, 8
bind = , 9, workspace, 9
bind = , 0, workspace, 10

bind = , q,      killactive
bind = , q,      submap, reset
bind = , v,      layoutmsg, togglesplit
bind = , v,      submap, reset
bind = , s,      layoutmsg, togglesplit
bind = , s,      submap, reset
bind = , r,      submap, window-resize
bind = , escape, submap, reset
bind = , return, submap, reset
bind = $mod, w,  submap, reset

submap = reset

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SUBMAP — RESIZE MODE (Super+R)
#  h/j/k/l     → 10px steps
#  Shift+h/j/k/l → 25px steps
#  Ctrl+h/j/k/l  → 2px steps
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, R, submap, window-resize
submap = window-resize

binde = , h,       resizeactive, -10 0
binde = , l,       resizeactive, 10 0
binde = , j,       resizeactive, 0 10
binde = , k,       resizeactive, 0 -10
binde = SHIFT, h,  resizeactive, -25 0
binde = SHIFT, l,  resizeactive, 25 0
binde = SHIFT, j,  resizeactive, 0 25
binde = SHIFT, k,  resizeactive, 0 -25
binde = CTRL, h,   resizeactive, -2 0
binde = CTRL, l,   resizeactive, 2 0
binde = CTRL, j,   resizeactive, 0 2
binde = CTRL, k,   resizeactive, 0 -2

bind = , escape, submap, reset
bind = , return, submap, reset
bind = , q,      submap, reset
bind = , r,      submap, window
bind = $mod, w,  submap, reset

submap = reset

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SUBMAP — POWER MENU (Super+P)
#  l → lock | x → exit | h → hibernate
#  r → reboot | p → poweroff | s → suspend
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, P, submap, power
submap = power

bind = , l, exec, hyprlock
bind = , l, submap, reset
bind = , x, exec, hyprctl dispatch exit
bind = , x, submap, reset
bind = , h, exec, systemctl hibernate
bind = , h, submap, reset
bind = , r, exec, systemctl reboot
bind = , r, submap, reset
bind = , p, exec, systemctl poweroff
bind = , p, submap, reset
bind = , s, exec, systemd-inhibit --what=sleep --who="manual-suspend" --why="User requested suspend" --mode=block systemctl suspend
bind = , s, submap, reset
bind = , escape, submap, reset

submap = reset

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SUBMAP — MONITOR MODE (Super+M)
#  1 → DP-2 only | 2 → Dual | 3 → HDMI only
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

bind = $mod, M, submap, monitor
submap = monitor

bind = , 1, exec, hyprctl keyword monitor "DP-2,disable"
bind = , 1, exec, hyprctl keyword monitor "DP-1,3440x1440@85,0x0,1"
bind = , 1, submap, reset
bind = , 2, exec, hyprctl keyword monitor "DP-1,3440x1440@85,0x0,1"
bind = , 2, exec, hyprctl keyword monitor "DP-2,2560x1440@165,3440x0,1"
bind = , 2, submap, reset
bind = , 3, exec, hyprctl keyword monitor "DP-1,disable"
bind = , 3, exec, hyprctl keyword monitor "DP-2,2560x1440@165,0x0,1"
bind = , 3, submap, reset
bind = , escape, submap, reset
bind = , return, submap, reset
bind = $mod, m,  submap, reset

submap = reset
